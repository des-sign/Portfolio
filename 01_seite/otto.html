
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>des_sign</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">

<style>

/* FONT */
@font-face {
  font-family: "Temeraire";
  src: url("../02_fonts/Temeraire Display Bk.ttf");
}



/* BASIC */
body {
  margin: 0;
  max-width: 1500px;
  height: 1080px; 
  background: black;
  color: white;
  font-family: 'Roboto Flex', sans-serif;
}

* {
  color: rgb(255, 255, 255);
}

/* ================= GRID ================= */
.section {
  width: 100%;
}

.inner {
  display: grid;
  grid-template-columns: 1fr 2fr 2fr 1fr;
  padding: 40px 40px 40px 40px;
}

/* ================= HEADER ================= */
.logo img {
  height: 11px;
}

/* BURGER */
.burger {
  grid-column: 4;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  align-items: flex-start;
  position: relative;
  z-index: 200;
}

.burger span {
  width: 25px;
  height: 3px;
  background: white;
  transition: all 0.3s ease;
  display: block;
  transform-origin: center;
}

.burger.open span:nth-child(1) {
  transform: translateY(5px) rotate(45deg);
}

.burger.open span:nth-child(2) {
  transform: translateY(-5px) rotate(-45deg);
}

/* MENÜ */
.nav-menu {
  grid-column: 4;
  display: none;
  position: absolute;
  gap: 100px;
  top: 0;
  right: 50px;
  width: 220px;
  height: 100%;
  flex-direction: column;
  justify-self: start;
  justify-content: flex-start;
  padding: 210px 0 0 0;
  box-sizing: border-box;
  z-index: 100;
  align-items: flex-start;
}

.nav-menu.open {
  display: flex;
}

.nav-menu a {
  font-size: 35px;
  letter-spacing: 4px;
  text-decoration: none;
  text-transform: uppercase;
  display: inline-block;
  width: fit-content;
  padding-bottom: 18px;
  border-bottom: 3px solid white;
  line-height: 1.57;
  color: #ffffff;
}

.nav-menu a:hover {
  color: #FF00BA;
}

/* Content-Section */
.section:last-of-type .inner {
  padding-top: 0px;
}

.section:first-of-type .inner {
  padding-bottom: 0;
}


/* ================= LINIE ================= */
.linie-wrapper {
  position: relative;
  margin-top: 50px;
}

.linie-wrapper .inner div {
  position: relative;
  top: 50px;
}

.linie-wrapper::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  top: -50px;
  bottom: 0;
  background: white;
}





  @media (max-width: 768px) {

  

body {
    height: auto;
    overflow-x: hidden;
  }

  /* ================= HEADER ================= */
  .section:first-of-type .inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  /* ================= CONTENT ================= */
  .section:not(:first-of-type) .inner {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
  }

  /* ALLE Spalten außer Header neutralisieren */
  .inner > div {
    width: 100% !important;
  }

  /* ================= REIHENFOLGE ================= */


  /* Reihenfolge: Bild, Vierecke, Text, Tags */
  .inner > div:nth-child(1) { order: 4; } /* Tags */
  .inner > div:nth-child(2) { order: 1; } /* Bild */
  .inner > div:nth-child(3) { order: 2; } /* Vierecke + Text */

      /* Bild volle Breite */
  .inner > div:nth-child(2) {
    padding: 0 0 40px 0 !important;
  }

  .inner > div:nth-child(2) img {
    width: 100% !important;
  }
 
 /* Text größer */
  .inner > div:nth-child(3) > div:last-child {
    font-size: 14px !important;
    line-height: 1.7 !important;
    padding-top: 40px;
    bottom: 40px;
  }
  

  /* Tags (immer 1. div) */
.tags {
    margin-top: 40px;
  }

  }

  /* ================= BILDER ================= */
  .section img {
    width: 100% !important;
    height: auto !important;
    display: block;
  }

  /* ================= UNTERE BILDER (außerhalb der Section) ================= */
  body > div:not(.section) img {
    width: 90% !important;
    height: auto;
    display: block;
    margin: 0 20px;
    left: 50px;
  }
    
  }

  
  /* ================= TEXT ================= */
  .section:not(:first-of-type) .inner > div:nth-child(3) {
    font-size: 20px;
    line-height: 1.7;
    margin: 20px;
  }

  /* ================= TAGS ================= */
  .tags {
    margin-top: 10px;
  }

}

</style>
</head>
<body>

<script>
  function toggleMenu() {
    document.getElementById('burger').classList.toggle('open');
