
<!DOCTYPE html>

<style>

/* FONT */
@font-face {
  font-family: "Temeraire";
  src: url("../02_fonts/Temeraire Display Bk.ttf");
}



/* BASIC */
body {
  margin: 0;
  max-width: 1500px;
  height: 1080px; 
  background: black;
  color: white;
  font-family: 'Roboto Flex', sans-serif;
}

* {
  color: rgb(255, 255, 255);
}

/* ================= GRID ================= */
.section {
  width: 100%;
}

.inner {
  display: grid;
  grid-template-columns: 1fr 2fr 2fr 1fr;
  padding: 40px 40px 40px 40px;
}

/* ================= HEADER FIX ================= */

.inner {
  display: grid;
  grid-template-columns: 1fr 2fr 2fr 1fr;
  padding: 40px;
  position: relative;
}

/* LOGO LINKS */
.logo {
  grid-column: 1;
  display: flex;
  align-items: center;
}

.logo img {
  height: 11px;
}

/* BURGER RECHTS */
.burger {
  grid-column: 4;
  justify-self: end;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 200;
}

/* BURGER STRICHE */
.burger span {
  width: 26px;
  height: 3px;
  background: white;
  transition: all 0.3s ease;
}

/* NAV MENU (overlay statt grid) */
.nav-menu {
  display: none;
  position: absolute;
  top: 60px;
  right: 40px;
  flex-direction: column;
  gap: 60px;
  width: 220px;
  z-index: 100;
  background: rgba(0,0,0,0.9);
  padding: 40px;
}

/* OPEN STATE */
.nav-menu.open {
  display: flex;
}

/* LINKS */
.nav-menu a {
  font-size: 20px;
  letter-spacing: 4px;
  text-decoration: none;
  text-transform: uppercase;
  border-bottom: 3px solid white;
  padding: 10px 5px;
  color: white;
}

.nav-menu a:hover {
  color: #FF00BA;
}

/* BURGER OPEN ANIMATION */
.burger.open span:nth-child(1) {
  transform: translateY(5px) rotate(45deg);
}

.burger.open span:nth-child(2) {
  transform: translateY(-5px) rotate(-45deg);
}


/* ================= LINIE ================= */
.linie-wrapper {
  position: relative;
  margin-top: 50px;
}

.linie-wrapper .inner div {
  position: relative;
  top: 50px;
}

.linie-wrapper::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  top: -50px;
  bottom: 0;
  background: white;
}
  


  
  @media (max-width: 768px) {


body {
    height: auto;
    overflow-x: hidden;
  }

  /* ================= HEADER ================= */
  .section:first-of-type .inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  /* ================= CONTENT ================= */
  .section:not(:first-of-type) .inner {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
  }

  /* ALLE Spalten außer Header neutralisieren */
  .inner > div {
    width: 100% !important;
  }

  /* ================= REIHENFOLGE ================= */

  /* Bild (immer 2. div in deiner Struktur) */
  .section:not(:first-of-type) .inner > div:nth-child(2) {
    order: 1;
    padding: 0 !important;
  }

  /* Text (immer 3. div) */
  .section:not(:first-of-type) .inner > div:nth-child(3) {
    order: 2;
  }


  

  /* Tags (immer 1. div) */
  .tags {
    order: 3;
  }

  /* ================= BILDER ================= */
  .section img {
    width: 100% !important;
    height: auto !important;
    display: block;
  }

  /* ================= UNTERE BILDER (außerhalb der Section) ================= */
  body > div:not(.section) img {
    width: 90% !important;
    height: auto;
    display: block;
    margin: 0 20px;
    left: 50px;
  }
    
  }

  
  /* ================= TEXT ================= */
  .section:not(:first-of-type) .inner > div:nth-child(3) {
    font-size: 20px;
    line-height: 1.7;
    margin: 20px;
  }

  /* ================= TAGS ================= */
  .tags {
    margin-top: 10px;
  }


}

  
</style>
</head>
<body>
