<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>des_sign</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">

<style>

/* FONT */
@font-face {
  font-family: "Temeraire";
  src: url("../02_fonts/Temeraire Display Bk.ttf");
}

/* BASIC */
body {
  margin: 0;
  max-width: 1500px;
  height: 1080px;
  background: black;
  color: white;
  font-family: 'Roboto Flex', sans-serif;
}

* {
  color: rgb(255, 255, 255);
}

/* ================= GRID ================= */
.section {
  width: 100%;
}

.inner {
  display: grid;
  grid-template-columns: 1fr 2fr 2fr 1fr;
  padding: 40px 40px;
}

/* ================= HEADER ================= */
.logo img {
  height: 11px;
}

.burger {
  grid-column: 4;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  position: relative;
  z-index: 200;
}

.burger span {
  width: 25px;
  height: 3px;
  background: white;
  transition: all 0.3s ease;
  display: block;
}

.burger.open span:nth-child(1) {
  transform: translateY(5px) rotate(45deg);
}

.burger.open span:nth-child(2) {
  transform: translateY(-5px) rotate(-45deg);
}

/* NAV */
.nav-menu {
  grid-column: 4;
  display: none;
  position: absolute;
  top: 0;
  right: 50px;
  width: 220px;
  height: 100%;
  flex-direction: column;
  padding: 210px 0 0 0;
  z-index: 100;
}

.nav-menu.open {
  display: flex;
}

.nav-menu a {
  font-size: 35px;
  letter-spacing: 4px;
  text-decoration: none;
  text-transform: uppercase;
  border-bottom: 3px solid white;
  padding-bottom: 18px;
}

/* ================= TAGS ================= */
.tags {
  font-size: 8px;
  line-height: 2;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

/* ================= CONTENT RESET ================= */
.section:last-of-type .inner {
  padding-top: 0;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  body {
    height: auto;
    overflow-x: hidden;
  }

  .section:first-of-type .inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  .section:first-of-type .logo {
    order: 1;
  }

  .section:first-of-type .burger {
    order: 2;
    margin-left: auto;
  }

  .section:not(:first-of-type) .inner {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
  }

  .section:not(:first-of-type) .inner > div {
    width: 100%;
    box-sizing: border-box;
  }

  /* ORDER */
  .section:not(:first-of-type) .inner > div:nth-child(1) { order: 4; }
  .section:not(:first-of-type) .inner > div:nth-child(2) { order: 1; }
  .section:not(:first-of-type) .inner > div:nth-child(3) { order: 2; }

  /* IMAGE */
  .section:not(:first-of-type) .inner > div:nth-child(2) img {
    width: 100% !important;
  }

  /* TEXT */
  .section:not(:first-of-type) .inner > div:nth-child(3) > div:last-child {
    font-size: 14px;
    line-height: 1.7;
    padding-top: 40px;
  }

  /* TAGS spacing */
  .tags {
    margin-top: 40px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="section">
  <div class="inner">

    <div class="logo">
      <a href="../index.html">
        <img src="../05_txt-grafik/des_sign_weiss.png">
      </a>
    </div>

    <div></div>
    <div></div>

    <div class="burger" onclick="toggleMenu()">
      <span></span>
      <span></span>
    </div>

    <div class="nav-menu" id="navMenu">
      <a href="#">DESIGN</a>
      <a href="#">FOCUS</a>
      <a href="#">STORY</a>
      <a href="#">HALLO</a>
    </div>

  </div>
</div>

<!-- CONTENT -->
<div class="section">
  <div class="inner">

    <!-- TAGS -->
    <div class="tags">
      <div># PLAKATE</div>
      <div># BRAND</div>
      <div># DESIGN</div>
    </div>

    <!-- IMAGE -->
    <div>
      <div style="position:relative;">
        <img src="../04_portfolio/c_christian_mockup.jpg"
             style="width:95%; height:auto; display:block;">
        <img src="../04_portfolio/c_christian.jpg"
             style="width:95%; height:auto; position:absolute; top:0; left:0; opacity:0;">
      </div>
    </div>

    <!-- TEXT -->
    <div style="display:flex; flex-direction:column; justify-content:space-between;">

      <div style="display:flex; gap:15px;">
        <div style="width:30px; height:30px; background:#ffffff;"></div>
        <div style="width:30px; height:30px; background:#547475;"></div>
      </div>

      <div style="font-size:10px; line-height:1.7;">
        <p><strong>TYPOGRAFIE-PLAKAT</strong></p>
        <p>
          Ein Buchstabe, eine Geschichte, ganz nah,<br>
          das „C“ steht für eine Person, die besonders war.<br><br>

          Name und Geburtstag, fein notiert,<br>
          ein persönlicher Zweizeiler, der berührt und führt.
        </p>
      </div>

    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.querySelector('.burger').classList.toggle('open');
  document.getElementById('navMenu').classList.toggle('open');
}
</script>

</body>
</html>
