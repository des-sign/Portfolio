<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>des_sign</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">

<style>

/* ================= BASIC ================= */
body {
  margin: 0;
  max-width: 1500px;
  background: black;
  color: white;
  font-family: 'Roboto Flex', sans-serif;
}

* {
  color: white;
  box-sizing: border-box;
}

/* ================= DESKTOP GRID ================= */
.section {
  width: 100%;
}

.inner {
  display: grid;
  grid-template-columns: 1fr 2fr 2fr 1fr;
  padding: 40px;
}

/* ================= HEADER ================= */
.logo img {
  height: 11px;
}

.burger {
  grid-column: 4;
  justify-self: end;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 200;
}

.burger span {
  width: 26px;
  height: 3px;
  background: white;
}

/* NAV */
.nav-menu {
  display: none;
  position: absolute;
  top: 60px;
  right: 40px;
  flex-direction: column;
  gap: 40px;
  padding: 30px;
  background: rgba(0,0,0,0.9);
}

.nav-menu.open {
  display: flex;
}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px) {

  body {
    height: auto;
    overflow-x: hidden;
  }

  /* HEADER */
  .section:first-of-type .inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
  }

  .logo img {
    height: 18px;
  }

  .burger span {
    width: 32px;
  }

  /* CONTENT -> STACK */
  .section:not(:first-of-type) .inner {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
  }

  .section:not(:first-of-type) .inner > div {
    width: 100% !important;
  }

  /* ORDER FIX (DEIN STRUKTUR SYSTEM BLEIBT) */
  .section:not(:first-of-type) .inner > div:nth-child(1) {
    order: 3; /* tags */
  }

  .section:not(:first-of-type) .inner > div:nth-child(2) {
    order: 1; /* bild */
    padding: 0 !important;
  }

  .section:not(:first-of-type) .inner > div:nth-child(3) {
    order: 2; /* text */
  }

  /* IMAGES FULL WIDTH */
  .section:not(:first-of-type) img {
    width: 100% !important;
    height: auto !important;
    display: block;
  }

  /* TYPE 4 / MULTI IMAGES */
  .type-4 {
    display: flex !important;
    flex-direction: column !important;
    gap: 16px !important;
  }

  .type-4 img {
    width: 100% !important;
  }

  /* REMOVE ALL LINES */
  .linie-wrapper,
  div[style*="height: 200px"],
  div[style*="width: 2px"] {
    display: none !important;
  }
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="section">
  <div class="inner">

    <div class="logo">
      <img src="../05_txt-grafik/des_sign_weiss.png">
    </div>

    <div></div>
    <div></div>

    <div class="burger" onclick="toggleMenu()">
      <span></span>
      <span></span>
    </div>

    <div class="nav-menu" id="navMenu">
      <a href="#">DESIGN</a>
      <a href="#">FOCUS</a>
      <a href="#">STORY</a>
    </div>

  </div>
</div>

<!-- ================= CONTENT ================= -->
<div class="section">
  <div class="inner">

    <!-- TAGS -->
    <div>
      <div style="font-size:8px; line-height:2;">
        <div># TAG 1</div>
        <div># TAG 2</div>
        <div># TAG 3</div>
      </div>
    </div>

    <!-- IMAGE BLOCK -->
    <div>
      <img src="../04_portfolio/typo_design_plakat.jpg">
    </div>

    <!-- TEXT -->
    <div>
      <p style="font-size:10px; line-height:1.7;">
        <strong>TITEL</strong><br><br>
        Dein Text bleibt hier unverändert.
      </p>
    </div>

  </div>
</div>

<!-- ================= TYPE 4 (2 IMAGES untereinander) ================= -->
<div class="section">
  <div class="inner">

    <div></div>

    <div class="type-4">
      <img src="../04_portfolio/typo_design_plakat_2.jpg">
      <img src="../04_portfolio/G_TYP-Grafik.jpg">
    </div>

    <div></div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById('navMenu').classList.toggle('open');
}
</script>

</body>
</html>
